<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>E-mail confirmé — EKꓘO</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: #14233A;
      background: #F5F7FA;
    }
    header {
      background: #15263F;
      color: #fff;
      padding: 28px 20px;
      text-align: center;
    }
    header h1 { margin: 0; font-size: 22px; letter-spacing: 0.5px; }
    main {
      flex: 1;
      max-width: 560px;
      width: 100%;
      margin: 0 auto;
      padding: 40px 20px;
      text-align: center;
    }
    .check {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #2E9E7B;
      color: #fff;
      font-size: 38px;
      line-height: 72px;
      margin: 0 auto 20px;
    }
    h2 { font-size: 20px; margin: 0 0 10px; color: #15263F; }
    p { margin: 8px 0; font-size: 16px; }
    .muted { color: #515E76; font-size: 14px; }
    footer {
      text-align: center;
      color: #515E76;
      font-size: 13px;
      padding: 24px 20px 40px;
    }
    @media (prefers-color-scheme: dark) {
      body { color: #E8ECF4; background: #0A1626; }
      h2 { color: #B9CBE8; }
      .muted, footer { color: #9AA6BC; }
    }
  </style>
</head>
<body>
  <header>
    <h1>EKꓘO</h1>
  </header>

  <main>
    <div class="check">&#10003;</div>
    <h2>Ton adresse e-mail est confirmée</h2>
    <p>Tu peux fermer cette page et <strong>retourner dans l'application EKꓘO</strong> pour te connecter.</p>
    <p class="muted">Onglet Profil → « Se connecter », avec ton e-mail et ton mot de passe.</p>
  </main>

  <footer>
    EKꓘO — Confirmation d'adresse e-mail
  </footer>
</body>
</html>
